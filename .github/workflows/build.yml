name: Build aps3e

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install ccache
      run: |
        sudo apt-get install -y --no-install-recommends ccache
        echo "/usr/lib/ccache" >> $GITHUB_PATH

    - name: Cache NDK and CMake
      uses: actions/cache@v4
      with:
        path: /usr/local/lib/android/sdk/ndk
        key: ${{ runner.os }}-ndk-${{ hashFiles('**/build.gradle*', '**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ndk-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache CMake build outputs
      uses: actions/cache@v4
      with:
        path: app/.cxx
        key: ${{ runner.os }}-cxx-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp') }}
        restore-keys: |
          ${{ runner.os }}-cxx-

    - name: Configure ccache
      run: |
        ccache --max-size=5G
        ccache --set-config=compression=true
        ccache --set-config=compression_level=1
        ccache -z

    - name: Generate Dummy Keystore for CI
      run: |
        mkdir -p app
        keytool -genkey -v \
          -keystore app/aps3e.keystore \
          -alias aps3e \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=aps3e, OU=Developer, O=EmuHub, C=EG"

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Configure Gradle properties
      run: |
        mkdir -p ~/.gradle
        cat >> ~/.gradle/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx6g -XX:+UseG1GC -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
        org.gradle.parallel=true
        org.gradle.caching=true
        org.gradle.configureondemand=true
        org.gradle.daemon=true
        android.enableJetifier=false
        android.useAndroidX=true
        android.native.buildOutput=verbose
        EOF

    - name: Build APK with ccache
      env:
        CCACHE_DIR: ~/.ccache
        NDK_CCACHE: ccache
        USE_CCACHE: 1
        CCACHE_SLOPPINESS: file_stat_matches,include_file_ctime,time_macros,pch_defines
      run: |
        ./gradlew assembleRelease \
          --parallel \
          --build-cache \
          --daemon \
          --configuration-cache \
          -Dkotlin.incremental=true \
          -Dkotlin.daemon.jvm.options="-Xmx2g"
        ccache -s

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aps3e-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7